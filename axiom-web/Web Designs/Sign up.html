<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Axiom | Authentication</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            background-color: #0F172A; /* Level 0 Base from Style Guidance */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        .auth-card {
            background-color: #1E293B; /* Level 1 Panels */
            border: 1px solid #334155; /* Level 2 Border */
        }

        .technical-input {
            background-color: #0F172A; /* Input Base */
            border: 1px solid #334155;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }

        .technical-input:focus {
            outline: none;
            border-color: #6366F1; /* Indigo Focus from Style Guidance */
            box-shadow: 0 0 0 1px #6366F1;
        }

        /* Material Symbols Weight Adjustment */
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
            font-size: 18px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#1000a9",
                        "surface-dim": "#13131b",
                        "secondary-fixed": "#e0e0ff",
                        "on-primary-container": "#0d0096",
                        "secondary-container": "#2f3aa3",
                        "on-secondary-fixed": "#000767",
                        "on-tertiary-fixed": "#301400",
                        "surface-container": "#1f1f27",
                        "outline": "#908fa0",
                        "on-tertiary": "#4f2500",
                        "tertiary-fixed-dim": "#ffb783",
                        "on-primary-fixed": "#07006c",
                        "background": "#0F172A",
                        "on-error": "#690005",
                        "tertiary-fixed": "#ffdcc5",
                        "inverse-surface": "#e4e1ed",
                        "on-tertiary-container": "#452000",
                        "tertiary-container": "#d97721",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-background": "#e4e1ed",
                        "surface": "#13131b",
                        "secondary": "#bdc2ff",
                        "primary-container": "#8083ff",
                        "error": "#ffb4ab",
                        "surface-tint": "#c0c1ff",
                        "secondary-fixed-dim": "#bdc2ff",
                        "surface-container-lowest": "#0d0d15",
                        "on-error-container": "#ffdad6",
                        "primary": "#6366F1",
                        "surface-bright": "#393841",
                        "on-surface-variant": "#94A3B8",
                        "surface-variant": "#34343d",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "on-secondary": "#131e8c",
                        "on-secondary-fixed-variant": "#2f3aa3",
                        "on-tertiary-fixed-variant": "#703700",
                        "surface-container-low": "#1b1b23",
                        "tertiary": "#64748B",
                        "inverse-primary": "#494bd6",
                        "on-surface": "#e4e1ed",
                        "surface-container-high": "#292932",
                        "error-container": "#93000a",
                        "on-secondary-container": "#a8afff",
                        "surface-container-highest": "#34343d",
                        "primary-fixed": "#e1e0ff",
                        "outline-variant": "#334155",
                        "inverse-on-surface": "#303038"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "body-sm": ["Inter", "sans-serif"],
                        "headline-sm": ["Inter", "sans-serif"],
                        "code-md": ["JetBrains Mono", "monospace"],
                        "body-md": ["Inter", "sans-serif"],
                        "label-md": ["Inter", "sans-serif"],
                        "code-sm": ["JetBrains Mono", "monospace"]
                    },
                    "fontSize": {
                        "body-sm": ["13px", {"lineHeight": "18px", "fontWeight": "400"}],
                        "headline-sm": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "code-md": ["13px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-md": ["11px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "code-sm": ["12px", {"lineHeight": "18px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="flex flex-col min-h-screen items-center justify-center font-body-md text-on-surface p-4">
<!-- Shell Suppression applied: No Navbars for Login screen -->
<main class="w-full max-w-[420px] flex flex-col items-center">
<!-- Login Card -->
<div class="auth-card w-full p-8 rounded-lg shadow-2xl">
<!-- Header Identity -->
<div class="flex flex-col items-center mb-8">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary" data-icon="api">api</span>
<h1 class="font-headline-sm text-headline-sm font-black tracking-tighter uppercase">AXIOM</h1>
</div>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Workbench Authentication</p>
</div>
<!-- Auth Form -->
<form class="space-y-5" id="auth-form" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-on-surface-variant uppercase flex items-center gap-2" for="email">
<span class="material-symbols-outlined text-[14px]" data-icon="alternate_email">alternate_email</span>
                        Email Address
                    </label>
<input class="technical-input w-full h-[36px] px-3 rounded font-code-md text-code-md text-on-surface placeholder:text-outline-variant" id="email" name="email" placeholder="developer@axiom.io" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant uppercase flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-[14px]" data-icon="lock">lock</span>
                            Password
                        </label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">FORGOT?</a>
</div>
<div class="relative">
<input class="technical-input w-full h-[36px] px-3 rounded font-code-md text-code-md text-on-surface placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full h-[40px] bg-primary text-white font-label-md text-label-md uppercase tracking-widest rounded hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-2" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-[16px]" data-icon="login">login</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-md text-label-md text-outline-variant">OR</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<!-- Secondary Actions -->
<div class="flex flex-col items-center gap-4">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-on-surface transition-colors" href="#">
                    New to the workbench? <span class="text-primary font-medium">Create account</span>
</a>
<div class="flex gap-4">
<button class="flex items-center gap-2 px-3 py-1.5 border border-outline-variant rounded hover:bg-surface-variant/50 transition-all font-label-md text-label-md text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="terminal">terminal</span>
                        SSO
                    </button>
<button class="flex items-center gap-2 px-3 py-1.5 border border-outline-variant rounded hover:bg-surface-variant/50 transition-all font-label-md text-label-md text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]" data-icon="code">code</span>
                        GITHUB
                    </button>
</div>
</div>
</div>
<!-- Technical Hint (Mono) -->
<div class="mt-6 flex items-center gap-2 opacity-40 hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-[14px]" data-icon="info">info</span>
<span class="font-code-sm text-code-sm text-on-surface-variant">Connection secured via TLS 1.3 / Axiom-Auth-v2</span>
</div>
</main>
<!-- Global Footer -->
<footer class="mt-auto py-8">
<p class="font-label-md text-label-md text-tertiary uppercase tracking-[0.2em]">
            Axiom — API Testing &amp; QA Platform
        </p>
</footer>
<script>
        // Micro-interaction for the submit button
        document.querySelector('#auth-form').addEventListener('submit', (e) => {
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> AUTHENTICATING...';
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                // Interaction simulation complete
            }, 1200);
        });

        // Simple input focus tracking for background subtle glow
        const inputs = document.querySelectorAll('.technical-input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('bg-primary/5');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('bg-primary/5');
            });
        });
    </script>
</body></html>
